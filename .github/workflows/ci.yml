name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r backend/requirements.txt
          .venv/bin/pip install -r memory/requirements.txt
          .venv/bin/pip install pytest pytest-asyncio pytest-cov ruff mypy

      - name: Run linter
        run: |
          .venv/bin/ruff check backend/ memory/ agents/ --select F,E9,W6
          .venv/bin/ruff format --check backend/ memory/ agents/

      - name: Run tests
        env:
          TITANIUM_TESTING: "true"
        run: |
          .venv/bin/pytest backend/tests/ \
            --ignore=backend/tests/e2e \
            -v \
            --cov=backend \
            --cov=memory \
            --cov=agents \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run linter
        run: cd frontend && npx eslint src --ext ts,tsx

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Run tests
        run: cd frontend && npm test -- --run

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: false
          load: true
          tags: titanium-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          load: true
          tags: titanium-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify images
        run: |
          docker images titanium-backend titanium-frontend
