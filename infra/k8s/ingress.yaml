apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: titanium-ingress
  namespace: titanium
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - titanium.example.com
      secretName: titanium-tls
  rules:
    - host: titanium.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: titanium-backend-service
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: titanium-frontend-service
                port:
                  number: 3000
