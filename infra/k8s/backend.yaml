apiVersion: apps/v1
kind: Deployment
metadata:
  name: titanium-backend
  namespace: titanium
  labels:
    app: titanium-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: titanium-backend
  template:
    metadata:
      labels:
        app: titanium-backend
    spec:
      containers:
        - name: backend
          image: titanium-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama-service:11434"
            - name: EMBEDDER_PROVIDER
              value: "ollama"
            - name: VECTOR_STORE
              value: "qdrant"
            - name: QDRANT_HOST
              value: "qdrant-service"
            - name: QDRANT_PORT
              value: "6333"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: titanium-backend-service
  namespace: titanium
spec:
  selector:
    app: titanium-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
